services:
  postgres:
    image: postgres:16
    container_name: pureplate-postgres
    environment:
      POSTGRES_USER: pureplate
      POSTGRES_PASSWORD: pureplate_password
      POSTGRES_DB: pureplate_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
